# Auto-update architecture diagram and progress notes on merge to main.
#
# REMINDER: Add ANTHROPIC_API_KEY to GitHub repo secrets:
#   Settings → Secrets and variables → Actions → New repository secret
#
# This workflow runs on every push to main (i.e. merged PRs).
# It skips commits made by the bot itself via [skip ci] in the commit message.

name: Update Docs on Merge

on:
  push:
    branches: [main]

jobs:
  update-docs:
    # Skip if the commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Run docs update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-docs-on-merge.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add architecture.excalidraw 'markdown/progress/*.md'
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "docs: auto-update architecture and progress [skip ci]"
          git diff --cached --quiet || git push
