# Auto-update architecture diagram and progress notes when a PR is merged to main.
#
# REMINDER: Add ANTHROPIC_API_KEY to GitHub repo secrets:
#   Settings → Secrets and variables → Actions → New repository secret
#
# This workflow runs only on merged PRs to main (not direct pushes).
# The update script exits early (successfully) for trivial or non-code changes.

name: Update Docs on Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  update-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Run docs update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-docs-on-merge.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add architecture.excalidraw 'markdown/progress/*.md'
          # Only commit and push if there are staged changes
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-update architecture and progress [skip ci]"
            git push origin HEAD:main
          fi
